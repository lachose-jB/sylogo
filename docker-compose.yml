version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: syligogo_db
    environment:
      MYSQL_DATABASE: syligogo
      MYSQL_USER: syligogo
      MYSQL_PASSWORD: syligogo_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - '3306:3306'
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'syligogo', '-psyligogo_secret']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: syligogo_api
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: mysql://syligogo:syligogo_secret@mysql:3306/syligogo
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
      API_URL: http://localhost:4000
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: front_end
      dockerfile: Dockerfile
    container_name: syligogo_frontend
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  mysqldata:
  uploads:
