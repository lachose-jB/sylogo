services:
  # ─── API GraphQL ──────────────────────────────────────────────────────────────
  - type: web
    name: syligogo-api
    runtime: docker
    # Le Dockerfile est à la racine du repo (contexte = racine)
    dockerfilePath: ./api/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false          # À remplir manuellement dans le dashboard Render
      - key: JWT_SECRET
        generateValue: true  # Render génère automatiquement une valeur aléatoire
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false          # URL de ton front Vercel, ex: https://syligogo.vercel.app
      - key: API_URL
        sync: false          # URL publique de ce service, ex: https://syligogo-api.onrender.com
